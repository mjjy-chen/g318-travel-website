<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a4e"/>
      <stop offset="100%" stop-color="#4a90d9"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#777"/>
    </linearGradient>
  </defs>
  <!-- Sky background -->
  <rect width="64" height="64" rx="8" fill="url(#sky)"/>
  <!-- Far mountains (snow-capped) -->
  <polygon points="0,42 12,18 24,38" fill="#7ab8e0" opacity="0.6"/>
  <polygon points="14,42 32,10 50,42" fill="#fff" opacity="0.9"/>
  <polygon points="38,42 52,22 64,42" fill="#8ec5e8" opacity="0.7"/>
  <!-- Mountain snow highlights -->
  <polygon points="28,16 32,10 36,16" fill="#fff"/>
  <!-- Near mountain (dark) -->
  <polygon points="0,52 20,30 44,52" fill="#3a5a3a"/>
  <!-- Road (S-curve switchback) -->
  <path d="M20,64 L20,56 Q20,52 24,50 L34,46 Q38,44 38,40 L38,34 Q38,30 42,28 L52,24 Q56,22 56,18 L56,12" 
        stroke="#e8c840" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Road dashes -->
  <path d="M20,64 L20,56 Q20,52 24,50 L34,46 Q38,44 38,40 L38,34 Q38,30 42,28 L52,24 Q56,22 56,18 L56,12" 
        stroke="#fff" stroke-width="1" fill="none" stroke-dasharray="3,4" stroke-linecap="round" opacity="0.7"/>
  <!-- "318" text at bottom -->
  <text x="32" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="10" fill="#e8c840">318</text>
</svg>
